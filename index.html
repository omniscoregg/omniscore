<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniscoreGG — Résultats Esport</title>
  <link rel="stylesheet" href="style.css">

  <!-- ── Open Graph ── -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://omniscore.pages.dev">
  <meta property="og:title"       content="OmniscoreGG — Résultats, Prédictions & Classement Esport">
  <meta property="og:description" content="Suivez vos matchs en direct, prédisez les résultats et grimpez dans le classement sur 10 jeux esport professionnels.">
  <meta property="og:image"       content="https://omniscore.pages.dev/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:site_name"   content="OmniscoreGG">
  <meta property="og:locale"      content="fr_FR">

  <!-- ── Twitter Card ── -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="OmniscoreGG — Résultats, Prédictions & Classement Esport">
  <meta name="twitter:description" content="Suivez vos matchs en direct, prédisez les résultats et grimpez dans le classement sur 10 jeux esport.">
  <meta name="twitter:image"       content="https://omniscore.pages.dev/og-image.png">

  <!-- ── Favicon ── -->
  <link rel="icon" type="image/png" href="omniscore_logo-png.png">
</head>
<body>

  <!-- ── Navbar ── -->
  <nav class="navbar">
    <div class="navbar-logo" style="cursor:pointer">
      <img src="omniscore_logo-png.png" alt="Omniscore" class="navbar-logo-img" style="pointer-events:none">
    </div>
    <button class="mobile-games-btn" onclick="toggleGameDrawer()" id="hamburger-btn">☰ Jeux</button>
    <div class="navbar-spacer"></div>
    <button id="fav-nav-btn" class="fav-nav-btn" onclick="showFavoritesPage()" title="Mes favoris" style="display:none">⭐ Favoris</button>
    <div id="auth-bar" class="auth-bar"></div>
    <div id="lang-switcher" class="lang-switcher"></div>
  </nav>

  <!-- ── Layout principal ── -->
  <div class="layout">
    <aside class="sidebar-left">
      <div id="games-title" class="sidebar-title">Jeux</div>
      <div id="game-filters"></div>
    </aside>
    <main class="main-content">
      <div id="matches-list"></div>
    </main>
  </div>

  <!-- Firebase SDK via CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore-compat.js"></script>

  <!-- Scripts (ordre important) -->
  <script src="api.js"></script>
  <script src="i18n.js"></script>
  <script src="firebase.js"></script>
  <script src="ranks.js"></script>
  <script src="predictions.js"></script>
  <script src="match-detail.js"></script>
  <script src="favorites.js"></script>
  <script src="team-detail.js"></script>
  <script src="profile.js"></script>
  <script src="leagues.js"></script>
  <script src="landing.js"></script>
  <script src="home.js"></script>
  <script src="blog.js"></script>
  <script src="esport-info.js"></script>
  <script src="champions.js"></script>
  <script src="seasons.js"></script>
  <script src="app.js"></script>

  <!-- Drawer jeux mobile -->
  <div class="drawer-overlay" id="drawer-overlay" onclick="closeGameDrawer()"></div>
  <div class="mobile-games-drawer" id="games-drawer">
    <div id="drawer-game-list"></div>
  </div>

  <!-- Bottom navigation mobile -->
  <nav class="mobile-bottom-nav" id="mobile-bottom-nav">
    <button class="mobile-nav-btn" onclick="toggleGameDrawer()" id="mnav-games">
      <span class="nav-icon">☰</span><span>Jeux</span>
    </button>
    <button class="mobile-nav-btn" onclick="showFavoritesPage && showFavoritesPage()">
      <span class="nav-icon">⭐</span><span>Favoris</span>
    </button>
    <button class="mobile-nav-btn active" onclick="mobileGoHome(this)">
      <span class="nav-icon">🏠</span><span>Accueil</span>
    </button>
    <button class="mobile-nav-btn" onclick="showLeaguesPage && showLeaguesPage()">
      <span class="nav-icon">⚔️</span><span>Ligues</span>
    </button>
    <button class="mobile-nav-btn" onclick="showLeaderboard && showLeaderboard()">
      <span class="nav-icon">🏆</span><span>Classement</span>
    </button>
  </nav>

</body>
</html>
